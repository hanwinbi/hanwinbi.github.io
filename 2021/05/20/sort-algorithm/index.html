eyword">int</span>&gt; &amp;vec)</span></span>;</span><br><span class="line"><span class="function"><span class="keyword">void</span> <span class="title">CountSort</span><span class="params">(<span class="built_in">vector</span>&lt;<span class="keyword">int</span>&gt;&amp; nums)</span></span>;</span><br><span class="line"><span class="function"><span class="keyword">int</span> <span class="title">maxbit</span><span class="params">(<span class="built_in">vector</span>&lt;<span class="keyword">int</span>&gt; nums)</span></span>;</span><br><span class="line"><span class="function"><span class="keyword">void</span> <span class="title">RadixSort</span><span class="params">(<span class="built_in">vector</span>&lt;<span class="keyword">int</span>&gt;&amp; nums)</span></span>;</span><br><span class="line"></span><br><span class="line"><span class="comment">// 冒泡排序，从小到大排序</span></span><br><span class="line"><span class="function"><span class="keyword">void</span> <span class="title">BubbleSort</span><span class="params">(<span class="built_in">vector</span>&lt;<span class="keyword">int</span>&gt; &amp;vec)</span></span>&#123;</span><br><span class="line">    <span class="keyword">int</span> len = vec.<span class="built_in">size</span>();</span><br><span class="line">    <span class="keyword">for</span>(<span class="keyword">int</span> i = len; i &gt;= <span class="number">0</span>; --i)&#123;</span><br><span class="line">        <span class="keyword">for</span>(<span class="keyword">int</span> j = <span class="number">1</span>; j &lt; i; ++j)&#123;</span><br><span class="line">            <span class="keyword">if</span>(vec[j<span class="number">-1</span>] &gt; vec[j])&#123;  <span class="comment">// &gt; 改为 &lt; 就是从大到小排序 </span></span><br><span class="line">                <span class="keyword">int</span> temp = vec[j<span class="number">-1</span>];</span><br><span class="line">                vec[j<span class="number">-1</span>] = vec[j];</span><br><span class="line">                vec[j] = temp;</span><br><span class="line">            &#125;</span><br><span class="line">        &#125;</span><br><span class="line">    &#125;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="comment">// 快速排序</span></span><br><span class="line"><span class="function"><span class="keyword">void</span> <span class="title">QuickSort</span><span class="params">(<span class="built_in">vector</span>&lt;<span class="keyword">int</span>&gt; &amp;vec, <span class="keyword">int</span> low, <span class="keyword">int</span> high)</span></span>&#123;</span><br><span class="line">    <span class="keyword">if</span>(low &gt;= high)&#123;</span><br><span class="line">        <span class="keyword">return</span> ;</span><br><span class="line">    &#125;</span><br><span class="line">    <span class="keyword">int</span> Pivot = Partition(vec, low, high);</span><br><span class="line">    QuickSort(vec, low, Pivot<span class="number">-1</span>);</span><br><span class="line">    QuickSort(vec, Pivot+<span class="number">1</span>, high);</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">int</span> <span class="title">Partition</span><span class="params">(<span class="built_in">vector</span>&lt;<span class="keyword">int</span>&gt; &amp;vec, <span class="keyword">int</span> low, <span class="keyword">int</span> high)</span></span>&#123;</span><br><span class="line">    <span class="keyword">int</span> i=rand()%(high-low+<span class="number">1</span>)+low;  <span class="comment">//随机选取主元</span></span><br><span class="line">    swap(vec[low],vec[i]);</span><br><span class="line">    <span class="keyword">int</span> pivot = vec[low];</span><br><span class="line">    <span class="keyword">while</span>(low&lt;high)&#123;</span><br><span class="line">        <span class="keyword">while</span>(low &lt; high &amp;&amp; vec[high] &gt;= pivot) --high;</span><br><span class="line">        vec[low] = vec[high];</span><br><span class="line">        <span class="keyword">while</span>(low &lt; high &amp;&amp; vec[low] &lt;= pivot) ++low;</span><br><span class="line">        vec[high] = vec[low];</span><br><span class="line">    &#125;</span><br><span class="line">    vec[low] = pivot;</span><br><span class="line">    <span class="keyword">return</span> low;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="comment">// 简单选择排序</span></span><br><span class="line"><span class="function"><span class="keyword">void</span> <span class="title">SelectSort</span><span class="params">(<span class="built_in">vector</span>&lt;<span class="keyword">int</span>&gt; &amp;vec)</span></span>&#123;</span><br><span class="line">    <span class="keyword">for</span>(<span class="keyword">int</span> i = <span class="number">0</span>; i != vec.<span class="built_in">size</span>(); ++i)&#123;</span><br><span class="line">        <span class="keyword">int</span> <span class="built_in">max</span> = M_max(vec, i);</span><br><span class="line">        <span class="keyword">int</span> temp = vec[<span class="built_in">max</span>];</span><br><span class="line">        vec[<span class="built_in">max</span>] = vec[i];</span><br><span class="line">        vec[i] = temp;</span><br><span class="line">    &#125;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">int</span> <span class="title">M_max</span><span class="params">(<span class="keyword">const</span> <span class="built_in">vector</span>&lt;<span class="keyword">int</span>&gt; vec, <span class="keyword">int</span> start)</span></span>&#123;</span><br><span class="line">    <span class="keyword">int</span> <span class="built_in">max</span> = INT_MIN;</span><br><span class="line">    <span class="keyword">int</span> pos = start;</span><br><span class="line">    <span class="keyword">for</span>(<span class="keyword">int</span> i = start; i &lt; vec.<span class="built_in">size</span>(); ++i)&#123;</span><br><span class="line">        <span class="keyword">if</span>(vec[i] &gt; <span class="built_in">max</span>)&#123;</span><br><span class="line">            <span class="built_in">max</span> = vec[i];</span><br><span class="line">            pos = i;</span><br><span class="line">        &#125;</span><br><span class="line">    &#125;</span><br><span class="line">    <span class="keyword">return</span> pos;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="comment">// 直接插入排序</span></span><br><span class="line"><span class="function"><span class="keyword">void</span> <span class="title">InsertSort</span><span class="params">(<span class="built_in">vector</span>&lt;<span class="keyword">int</span>&gt; &amp;vec)</span></span>&#123;</span><br><span class="line">    <span class="keyword">int</span> len = vec.<span class="built_in">size</span>();</span><br><span class="line">    <span class="keyword">for</span> (<span class="keyword">int</span> i = <span class="number">1</span>; i &lt; len; i++)</span><br><span class="line">    &#123;</span><br><span class="line">        <span class="keyword">int</span> value = vec[i];</span><br><span class="line">        <span class="keyword">int</span> pos = i;</span><br><span class="line">        <span class="keyword">while</span>(pos &gt; <span class="number">0</span> &amp;&amp; vec[pos<span class="number">-1</span>] &gt; value)&#123;</span><br><span class="line">            vec[pos] = vec[pos - <span class="number">1</span>];</span><br><span class="line">            pos--;</span><br><span class="line">        &#125;</span><br><span class="line">        vec[pos] = value;</span><br><span class="line">    &#125;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="comment">// 堆排序</span></span><br><span class="line"><span class="function"><span class="keyword">void</span> <span class="title">swap</span><span class="params">(<span class="built_in">vector</span>&lt;<span class="keyword">int</span>&gt; &amp;vec, <span class="keyword">int</span> i, <span class="keyword">int</span> j)</span></span>&#123;</span><br><span class="line">    <span class="keyword">int</span> temp = vec[i];</span><br><span class="line">    vec[i] = vec[j];</span><br><span class="line">    vec[j] = temp;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">void</span> <span class="title">max_heapify</span><span class="params">(<span class="built_in">vector</span>&lt;<span class="keyword">int</span>&gt; &amp;vec, <span class="keyword">int</span> i, <span class="keyword">int</span> <span class="built_in">end</span>)</span></span>&#123;</span><br><span class="line">    <span class="keyword">int</span> parent = i; <span class="comment">// 数组中的位置</span></span><br><span class="line">    <span class="keyword">int</span> son = <span class="number">2</span>*i + <span class="number">1</span>;  <span class="comment">// 用左子节点表示子孙</span></span><br><span class="line">    <span class="keyword">while</span>(son &lt;= <span class="built_in">end</span>)&#123;</span><br><span class="line">        <span class="keyword">if</span>(son+<span class="number">1</span> &lt;= <span class="built_in">end</span> &amp;&amp; vec[son] &lt; vec[son+<span class="number">1</span>])&#123; <span class="comment">//找到左右子节点中最大的那一个</span></span><br><span class="line">            son++;</span><br><span class="line">        &#125;</span><br><span class="line">        <span class="keyword">if</span>(vec[son] &gt; vec[parent])&#123;    <span class="comment">// 将大元素作为parents</span></span><br><span class="line">            swap(vec, son, parent);</span><br><span class="line">            parent = son;</span><br><span class="line">            son = <span class="number">2</span>*parent + <span class="number">1</span>;</span><br><span class="line">        &#125;<span class="keyword">else</span>&#123;</span><br><span class="line">            <span class="keyword">break</span>;</span><br><span class="line">        &#125;</span><br><span class="line">    &#125;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">void</span> <span class="title">HeapSort</span><span class="params">(<span class="built_in">vector</span>&lt;<span class="keyword">int</span>&gt; &amp;vec)</span></span>&#123;</span><br><span class="line">    <span class="keyword">int</span> len = vec.<span class="built_in">size</span>();</span><br><span class="line">    <span class="keyword">for</span> (<span class="keyword">int</span> i = len/<span class="number">2</span><span class="number">-1</span>; i &gt;= <span class="number">0</span>; --i)</span><br><span class="line">    &#123;   </span><br><span class="line">        max_heapify(vec, i, len<span class="number">-1</span>);</span><br><span class="line">    &#125;</span><br><span class="line">    <span class="keyword">for</span>(<span class="keyword">int</span> i = len - <span class="number">1</span>; i &gt;= <span class="number">0</span>; --i)&#123;</span><br><span class="line">        swap(vec, <span class="number">0</span>, i);</span><br><span class="line">        max_heapify(vec, <span class="number">0</span>, i<span class="number">-1</span>);</span><br><span class="line">    &#125;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="comment">// 归并排序</span></span><br><span class="line"><span class="comment">// 分治的思想</span></span><br><span class="line"><span class="function"><span class="keyword">void</span> <span class="title">MergePartition</span><span class="params">(<span class="built_in">vector</span>&lt;<span class="keyword">int</span>&gt; &amp;vec, <span class="built_in">vector</span>&lt;<span class="keyword">int</span>&gt; &amp;temp, <span class="keyword">int</span> low, <span class="keyword">int</span> high)</span></span>&#123;</span><br><span class="line">    <span class="keyword">if</span>(low &lt; high)&#123;</span><br><span class="line">        <span class="keyword">int</span> mid = (low + high)/<span class="number">2</span>;</span><br><span class="line">        MergePartition(vec, temp, low, mid);    <span class="comment">//左数组</span></span><br><span class="line">        MergePartition(vec, temp, mid+<span class="number">1</span>, high); <span class="comment">//右数组</span></span><br><span class="line">        MergeSort(vec, temp, low, mid, high);   <span class="comment">// 合并两个子序列</span></span><br><span class="line">    &#125;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">void</span> <span class="title">MergeSort</span><span class="params">(<span class="built_in">vector</span>&lt;<span class="keyword">int</span>&gt; &amp;vec, <span class="built_in">vector</span>&lt;<span class="keyword">int</span>&gt; &amp;temp, <span class="keyword">int</span> low, <span class="keyword">int</span> mid, <span class="keyword">int</span> high)</span></span>&#123;</span><br><span class="line">    <span class="keyword">int</span> i = low;</span><br><span class="line">    <span class="keyword">int</span> j = mid+<span class="number">1</span>;</span><br><span class="line">    <span class="keyword">int</span> k = <span class="number">0</span>;</span><br><span class="line">    <span class="keyword">while</span>(i &lt;= mid &amp;&amp; j &lt;= high)&#123;</span><br><span class="line">        temp[k++] = vec[i] &gt; vec[j] ? vec[i++] : vec[j++];</span><br><span class="line">    &#125;</span><br><span class="line">    <span class="keyword">while</span>(i &lt;= mid)&#123;</span><br><span class="line">        temp[k++] = vec[i++];</span><br><span class="line">    &#125;</span><br><span class="line">    <span class="keyword">while</span> (j &lt;= high)</span><br><span class="line">    &#123;</span><br><span class="line">        temp[k++] = vec[j++];</span><br><span class="line">    &#125;</span><br><span class="line">    <span class="keyword">for</span>(<span class="keyword">int</span> i = <span class="number">0</span>; i &lt; k; ++i)&#123;</span><br><span class="line">        vec[low+i] = temp[i];</span><br><span class="line">    &#125;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="comment">//希尔排序</span></span><br><span class="line"><span class="comment">// 递减增量，k_1, k_2 ... k_i,(k_t &gt; k_i), k_i = 1</span></span><br><span class="line"><span class="comment">// 将数组分成K个小块，小块内部进行插入排序</span></span><br><span class="line"><span class="function"><span class="keyword">void</span> <span class="title">ShellSort</span><span class="params">(<span class="built_in">vector</span>&lt;<span class="keyword">int</span>&gt; &amp;vec)</span></span>&#123;</span><br><span class="line">    <span class="keyword">int</span> len = vec.<span class="built_in">size</span>();</span><br><span class="line">    <span class="keyword">for</span>(<span class="keyword">int</span> delta = len/<span class="number">2</span>; delta &gt;= <span class="number">1</span>; delta /= <span class="number">2</span>)&#123;</span><br><span class="line">        <span class="keyword">for</span>(<span class="keyword">int</span> i = delta; i &lt; len; ++i)&#123;</span><br><span class="line">            <span class="keyword">for</span>(<span class="keyword">int</span> j = i; j &gt;= delta &amp;&amp; vec[j] &gt; vec[j-delta]; j -= delta)&#123;</span><br><span class="line">                <span class="keyword">int</span> temp = vec[j];</span><br><span class="line">                vec[j] = vec[j-delta];</span><br><span class="line">                vec[j-delta] = temp;</span><br><span class="line">            &#125;</span><br><span class="line">        &#125;</span><br><span class="line">    &#125;</span><br><span class="line">&#125;</span><br><span class="line"><span class="comment">// O(n^&#123;3/2&#125;)</span></span><br><span class="line"><span class="function"><span class="keyword">void</span> <span class="title">KuthShellSort</span><span class="params">(<span class="built_in">vector</span>&lt;<span class="keyword">int</span>&gt; &amp;vec)</span></span>&#123;</span><br><span class="line">    <span class="keyword">int</span> delta = <span class="number">1</span>;</span><br><span class="line">    <span class="keyword">while</span>(delta &lt; vec.<span class="built_in">size</span>()/<span class="number">3</span>)&#123;</span><br><span class="line">        delta = delta * <span class="number">3</span> + <span class="number">1</span>;</span><br><span class="line">    &#125;</span><br><span class="line">    <span class="keyword">for</span>(; delta &gt;= <span class="number">1</span>; delta /= <span class="number">3</span>)&#123;</span><br><span class="line">        <span class="keyword">for</span>(<span class="keyword">int</span> i = delta; i &lt; vec.<span class="built_in">size</span>(); ++i)&#123;</span><br><span class="line">            <span class="keyword">for</span>(<span class="keyword">int</span> j = i; j &gt;= delta &amp;&amp; vec[j] &gt; vec[j-delta]; j -= delta)&#123;</span><br><span class="line">                <span class="keyword">int</span> temp = vec[j];</span><br><span class="line">                vec[j] = vec[j-delta];</span><br><span class="line">                vec[j-delta] = temp;</span><br><span class="line">            &#125;</span><br><span class="line">        &#125;</span><br><span class="line">    &#125;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="comment">// 计数排序</span></span><br><span class="line"><span class="function"><span class="keyword">void</span> <span class="title">CountSort</span><span class="params">(<span class="built_in">vector</span>&lt;<span class="keyword">int</span>&gt;&amp; nums)</span></span>&#123;</span><br><span class="line">    <span class="comment">//找最小 最大值 确定数组大小</span></span><br><span class="line">    <span class="keyword">int</span> <span class="built_in">max</span> = INT_MIN;</span><br><span class="line">    <span class="keyword">int</span> <span class="built_in">min</span> = INT_MAX;</span><br><span class="line">    <span class="keyword">for</span>(<span class="keyword">int</span> i = <span class="number">0</span>; i != nums.<span class="built_in">size</span>(); ++i)&#123;</span><br><span class="line">        <span class="keyword">if</span>(nums[i] &gt; <span class="built_in">max</span>) <span class="built_in">max</span> = nums[i];</span><br><span class="line">        <span class="keyword">if</span>(nums[i] &lt; <span class="built_in">min</span>) <span class="built_in">min</span> = nums[i];</span><br><span class="line">    &#125;</span><br><span class="line"></span><br><span class="line">    <span class="keyword">int</span> k = <span class="built_in">max</span> - <span class="built_in">min</span> + <span class="number">1</span>;</span><br><span class="line">    <span class="function"><span class="built_in">vector</span>&lt;<span class="keyword">int</span>&gt; <span class="title">count</span><span class="params">(k, <span class="number">0</span>)</span></span>;</span><br><span class="line">    <span class="built_in">vector</span>&lt;<span class="keyword">int</span>&gt; res;</span><br><span class="line"></span><br><span class="line">    <span class="keyword">for</span>(<span class="keyword">int</span> i = <span class="number">0</span>; i &lt; nums.<span class="built_in">size</span>(); ++i)&#123;</span><br><span class="line">        count[nums[i] - <span class="built_in">min</span>]++;</span><br><span class="line">    &#125;</span><br><span class="line"></span><br><span class="line">    <span class="keyword">int</span> pos = <span class="number">0</span>;</span><br><span class="line">    <span class="keyword">for</span>(<span class="keyword">int</span> i = <span class="number">0</span>; i &lt; k; ++i)&#123;</span><br><span class="line">        <span class="keyword">while</span>(count[i]&gt;<span class="number">0</span>)&#123;</span><br><span class="line">            nums[pos++] = i + <span class="built_in">min</span>;</span><br><span class="line">            count[i]--;</span><br><span class="line">        &#125;</span><br><span class="line">    &#125;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="comment">//基数排序</span></span><br><span class="line"><span class="function"><span class="keyword">int</span> <span class="title">maxbit</span><span class="params">(<span class="built_in">vector</span>&lt;<span class="keyword">int</span>&gt; nums)</span></span>&#123;</span><br><span class="line">    <span class="keyword">int</span> <span class="built_in">max</span> = INT_MIN;</span><br><span class="line">    <span class="keyword">int</span> <span class="built_in">min</span> = INT_MAX;</span><br><span class="line">    <span class="keyword">for</span>(<span class="keyword">int</span> i = <span class="number">0</span>; i != nums.<span class="built_in">size</span>(); ++i)&#123;</span><br><span class="line">        <span class="keyword">if</span>(nums[i] &gt; <span class="built_in">max</span>) <span class="built_in">max</span> = nums[i];</span><br><span class="line">        <span class="keyword">if</span>(nums[i] &lt; <span class="built_in">min</span>) <span class="built_in">min</span> = nums[i];</span><br><span class="line">    &#125;</span><br><span class="line"></span><br><span class="line">    <span class="built_in">max</span> = <span class="built_in">max</span>&gt;(-<span class="built_in">min</span>) ? <span class="built_in">max</span>:(-<span class="built_in">min</span>);</span><br><span class="line">    <span class="keyword">int</span> count = <span class="number">1</span>;</span><br><span class="line">    <span class="keyword">while</span>(<span class="built_in">max</span>&gt;= <span class="number">10</span>)&#123;</span><br><span class="line">        <span class="built_in">max</span> /= <span class="number">10</span>;</span><br><span class="line">        count++;</span><br><span class="line">    &#125;</span><br><span class="line">    <span class="keyword">return</span> count;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">void</span> <span class="title">RadixSort</span><span class="params">(<span class="built_in">vector</span>&lt;<span class="keyword">int</span>&gt;&amp; nums)</span></span>&#123;</span><br><span class="line">    <span class="comment">// 最大数的数位是多少</span></span><br><span class="line">    <span class="keyword">int</span> <span class="built_in">bit</span> = maxbit(nums);</span><br><span class="line">    <span class="function"><span class="built_in">vector</span>&lt;<span class="keyword">int</span>&gt; <span class="title">count</span><span class="params">(<span class="number">19</span>, <span class="number">0</span>)</span></span>;	<span class="comment">//创建19的原因：负数0-9，正数10-19</span></span><br><span class="line">    <span class="comment">// 循环数位</span></span><br><span class="line">    <span class="function"><span class="built_in">vector</span>&lt;<span class="built_in">vector</span>&lt;<span class="keyword">int</span>&gt;&gt; <span class="title">res</span><span class="params">(<span class="number">19</span>)</span></span>;</span><br><span class="line">    <span class="keyword">int</span> pos, cur;</span><br><span class="line">    <span class="keyword">for</span>(<span class="keyword">int</span> i = <span class="number">0</span>, mod = <span class="number">1</span>; i &lt; <span class="built_in">bit</span>; ++i, mod *= <span class="number">10</span>)&#123;</span><br><span class="line">        <span class="keyword">for</span>(<span class="keyword">int</span> i = <span class="number">0</span>; i != nums.<span class="built_in">size</span>(); ++i)&#123;</span><br><span class="line">            pos = (nums[i]/mod) % <span class="number">10</span>;</span><br><span class="line">            res[pos+<span class="number">9</span>].push_back(nums[i]);</span><br><span class="line">        &#125;</span><br><span class="line">        cur = <span class="number">0</span>;</span><br><span class="line"></span><br><span class="line">        <span class="keyword">for</span>(<span class="keyword">int</span> i = <span class="number">0</span>; i &lt; <span class="number">19</span>; ++i)&#123;</span><br><span class="line">            <span class="keyword">for</span>(<span class="keyword">int</span> j = <span class="number">0</span>; j &lt; res[i].<span class="built_in">size</span>(); ++j)&#123;</span><br><span class="line">                nums[cur++] = res[i][j];</span><br><span class="line">            &#125;</span><br><span class="line">            res[i].<span class="built_in">clear</span>();</span><br><span class="line">        &#125;</span><br><span class="line">    &#125;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="comment">//打印输出</span></span><br><span class="line"><span class="function"><span class="keyword">void</span> <span class="title">print</span><span class="params">(<span class="keyword">const</span> <span class="built_in">vector</span>&lt;<span class="keyword">int</span>&gt; vec)</span></span>&#123;</span><br><span class="line">    <span class="keyword">for</span>(<span class="keyword">int</span> i = <span class="number">0</span>; i != vec.<span class="built_in">size</span>(); ++i)&#123;</span><br><span class="line">        <span class="built_in">cout</span> &lt;&lt; vec[i] &lt;&lt; <span class="built_in">endl</span>;</span><br><span class="line">    &#125;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">int</span> <span class="title">main</span><span class="params">()</span></span>&#123;</span><br><span class="line">    <span class="built_in">vector</span>&lt;<span class="keyword">int</span>&gt; vec = &#123;<span class="number">5</span>,<span class="number">7</span>,<span class="number">9</span>,<span class="number">6</span>,<span class="number">3</span>,<span class="number">4</span>,<span class="number">1</span>&#125;;</span><br><span class="line">    <span class="comment">// BubbleSort(vec);</span></span><br><span class="line">    <span class="comment">// QuickSort(vec, 0 ,vec.size()-1);</span></span><br><span class="line">    <span class="comment">// SelectSort(vec);</span></span><br><span class="line">    <span class="comment">// InsertSort(vec);</span></span><br><span class="line">    <span class="comment">// HeapSort(vec);</span></span><br><span class="line">    <span class="comment">// vector&lt;int&gt; temp = vec;</span></span><br><span class="line">    <span class="comment">// MergePartition(vec, temp, 0, vec.size()-1);</span></span><br><span class="line">    <span class="comment">// ShellSort(vec);</span></span><br><span class="line">    <span class="comment">// KuthShellSort(vec);</span></span><br><span class="line">    <span class="comment">// CountSort(vec);</span></span><br><span class="line">    RadixSort(vec);</span><br><span class="line">    <span class="built_in">print</span>(vec);</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>
